<!doctype html>
<html lang="en">
<head>
  <!--
    PAW Embed Guard (required):
    These tool pages are built for Circle embedding.
    If someone opens this page directly (not in an iframe), redirect to proagentworks.com.
    Keep this lightweight; no dependencies.
  -->
  <script>
    (function () {
      try {
        if (window.top === window.self) {
          window.location.replace("https://proagentworks.com");
        }
      } catch (e) {
        // If cross-origin framing prevents access to window.top, fail closed.
        window.location.replace("https://proagentworks.com");
      }
    })();
  </script>

  <script>
    // PAW Embed Mode Guard
    // -------------------
    // Circle provides the outer card. The embedded tool must render "flat".
    // We rely on paw-ui.css rules that activate when html[data-embed="1"] is present.
    // tool-shell.js will set this when initialized, but this UI scaffold does not
    // depend on shell init yet, so we set it here as well.
    (function(){
      try{
        var params = new URLSearchParams(window.location.search);
        var isEmbedParam = params.get('embed') === '1';
        var isInIframe = (function(){ try{ return window.self !== window.top; } catch(e){ return true; } })();
        if(isEmbedParam || isInIframe){
          document.documentElement.setAttribute('data-embed','1');
        }
      }catch(e){}
    })();
  </script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Presence</title>

  <!-- Shared PAW styles (do not fork) -->
  <link rel="stylesheet" href="./paw-ui.css">

  <!--
    ProAgent Works — Presence (Circle-embedded tool page)
    ----------------------------------------------------
    PURPOSE (v1):
    - Intent-aware content studio for identity, authority, and local expertise.
    - Generates public-facing content structured for its intended use.
    - Provides an "escape hatch" for real-world edge cases (Other / custom request).

    IMPORTANT PRODUCT RULES (LOCKED):
    - Circle owns the tool title. This embedded page MUST NOT render its own title.
    - Nothing is saved automatically. (This v1 UI does not implement Save; it can suggest it in copy.)
    - My Brand influence is contextual and applied by the Worker when relevant.
    - This page contains NO AI prompting logic. All "secret sauce" lives in the Worker.

    IMPLEMENTATION NOTES:
    - Uses tool-shell.js for consistent chat + deliverable modal behavior.
    - Uses deliverable mode (Copy / Revise) because Presence outputs are typically paste-ready.
    - Sends structured preferences to the Worker:
        content_type, content_other

    FUTURE PHASES (not implemented here):
    - Optional "Save to My Stuff" actions once Worker endpoints exist for Presence items.
    - Template-like reusable content blocks (My Brand / Presence patterns).
  -->

  <style>
    /* ==========================================================
       PAW Presence — Scoped UI styles (v1)
       ----------------------------------------------------------
       Goal:
       - Calm, structured, intent-aware controls without turning into a form.
       - Mobile-first behavior: stack cleanly; no horizontal scroll.
       - Scoped to Presence only (do not modify shared paw-ui.css).
       ========================================================== */

    body.paw-presence .presence-controls{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:12px 14px 12px;background:transparent;
    }

    body.paw-presence .presence-row{
      display:flex;
      flex-wrap:wrap;
      align-items:flex-start;
      gap:12px;
    }

    body.paw-presence .presence-block{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width: 240px;
      flex: 1 1 240px;
    }

    body.paw-presence .presence-label{
      font-size:12px;
      font-weight:900;
      color:rgba(15,23,42,.72);
      letter-spacing:-0.01em;
    }

    body.paw-presence .presence-input{
      height:38px;
      width:100%;
      border-radius:12px;
      border:1px solid rgba(15,23,42,.14);
      background:rgba(255,255,255,.92);
      padding:8px 10px;
      font-size:14px;
      font-weight:750;
      color:rgba(15,23,42,.92);
      outline:none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    }

    body.paw-presence .presence-input:focus{
      border-color:rgba(5,195,249,.70);
      box-shadow:0 0 0 4px rgba(5,195,249,.14);
      background:#fff;
    }

    body.paw-presence .presence-button-group{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    body.paw-presence .presence-choice{
      min-width:0;
      background:rgba(255,255,255,.92);
      color:rgba(15,23,42,.88);
      border-color:rgba(15,23,42,.12);
      font-weight:750;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    }

    body.paw-presence .presence-choice:hover{
      background:#fff;
      border-color:rgba(15,23,42,.18);
    }

    body.paw-presence .presence-choice.is-selected,
    body.paw-presence .presence-choice[aria-pressed="true"]{
      background:rgba(5,195,249,.18);
      color:rgba(15,23,42,.92);
      border-color:rgba(5,195,249,.38);
      box-shadow:inset 0 0 0 1px rgba(15,23,42,.08);
    }

    body.paw-presence .presence-block--missing .presence-label{
      color:rgba(153,27,27,.84);
    }

    body.paw-presence .presence-block--missing .presence-button-group{
      box-shadow:0 0 0 1px rgba(220,38,38,.22);
      border-radius:999px;
      background:rgba(254,242,242,.85);
    }

    body.paw-presence .presence-block--missing .presence-input{
      border-color:rgba(220,38,38,.22);
      box-shadow:0 0 0 1px rgba(220,38,38,.22);
      background:rgba(254,242,242,.85);
    }

    body.paw-presence .presence-block[hidden]{
      display:none !important;
    }

    body.paw-presence .presence-block[data-presence-group="primary"]{
      flex:1 1 100%;
      min-width:0;
    }

    body.paw-presence .presence-block[data-presence-group="secondary"],
    body.paw-presence .presence-block[data-presence-group="other"]{
      flex:0 1 auto;
      min-width:0;
    }

    body.paw-presence .presence-input{
      max-width:360px;
    }

    /* Hide the message area when empty so the composer sits closer to the intent controls (calmer feel) */
    body.paw-presence #messages:empty{
      display:none;
    }

    /* Mobile: stack blocks cleanly */
    @media (max-width: 560px){
      body.paw-presence .presence-controls{ padding:10px 12px 12px; }
      body.paw-presence .presence-row{ flex-direction:column; align-items:stretch; }
      body.paw-presence .presence-block{ min-width:0; width:100%; }
    }
  </style>
</head>

<body class="paw-presence">
  <div class="app">
    <div class="frame">
      <div class="panel">

        <div class="panel-topbar">
          <div class="topbar-row0">
            <div class="tool-head">
              <button id="pawMyStuffBtn" class="paw-mystuff-btn paw-works-btn" type="button" aria-label="Work context">
                <img class="works-paw" src="https://paw-tools.pages.dev/paw.png" alt="" aria-hidden="true">
                <span class="works-label">Work</span>
                <span class="works-chevron" aria-hidden="true">▾</span>
              </button>
            </div>

            

            <div class="topbar-right">
  

              <div class="utility-pair paw-seg" role="group" aria-label="Tool utilities">
                <button id="reset" class="util-btn paw-seg__btn" type="button">Reset</button>
                <button id="tips" class="util-btn paw-seg__btn" type="button">Tips &amp; How To</button>
              </div>
            </div>
          </div>

          <!-- Presence intent controls -->
          <div class="presence-controls" aria-label="Presence intent controls">
            <div class="presence-row" aria-label="Presence primary selectors">

              <div class="presence-block" data-presence-group="primary">
                <div class="presence-label">What are you creating?</div>
                <div id="presencePrimaryGroup" class="presence-button-group" role="group" aria-label="What are you creating?">
                  <button class="btn presence-choice" type="button" data-presence-primary="bio" aria-pressed="false">Bio</button>
                  <button class="btn presence-choice" type="button" data-presence-primary="social_post" aria-pressed="false">Social Post</button>
                  <button class="btn presence-choice" type="button" data-presence-primary="article" aria-pressed="false">Article</button>
                  <button class="btn presence-choice" type="button" data-presence-primary="guide" aria-pressed="false">Guide</button>
                  <button class="btn presence-choice" type="button" data-presence-primary="other" aria-pressed="false">Other</button>
                </div>
              </div>

              <div class="presence-block" id="presenceSecondaryBlock" data-presence-group="secondary" hidden>
                <div class="presence-label" id="presenceSecondaryLabel">Choose a focus</div>
                <div id="presenceSecondaryGroup" class="presence-button-group" role="group" aria-live="polite"></div>
              </div>

              <div class="presence-block" id="presenceOtherBlock" data-presence-group="other" hidden>
                <label class="presence-label" for="presenceOtherText">What do you want to create?</label>
                <input id="presenceOtherText" class="presence-input" type="text"
                  placeholder="Describe what you want to create" autocomplete="off" />
              </div>

            </div>
          </div>

        </div>

        <!-- Messages (shell-managed) -->
        <div id="messages" class="messages" aria-live="polite"></div>

        <!-- Composer -->
        <div class="composer">
          <div class="composer-main">
            <div class="composer-help">Tell PAW what you want to create. Paste notes or an existing draft if you have one.</div>
            <textarea id="prompt" class="prompt"
              placeholder="Example: Write 3 posts for first-time buyers in [CITY]"></textarea>
          </div>

          <button id="send" class="send" aria-label="Generate" type="button">
            <img src="https://paw-tools.pages.dev/paw.png" class="send-icon" alt="">
          </button>
        </div>

      </div>
    </div>
  </div>

  <div id="pawResumeModal" class="modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="pawResumeTitle">
      <div class="modal-head">
        <div id="pawResumeTitle" class="modal-title">Resume draft?</div>
        <button class="modal-close" id="pawResumeClose" aria-label="Close" type="button">✕</button>
      </div>
      <div class="modal-body">
        <p id="pawResumeMeta" style="margin:0 0 16px 0; color:rgba(15,23,42,.72);"></p>
        <div style="display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap;">
          <button class="btn" id="pawResumeFresh" type="button">Start fresh</button>
          <button class="btn primary" id="pawResumeGo" type="button">Restore</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tool-shell.js"></script>
  <script>
    const API_ENDPOINT = "https://paw-api.joe-b40.workers.dev";
    let showPresenceValidation = false;
    const $resumeModal = document.getElementById("pawResumeModal");
    const $resumeClose = document.getElementById("pawResumeClose");
    const $resumeMeta = document.getElementById("pawResumeMeta");
    const $resumeFresh = document.getElementById("pawResumeFresh");
    const $resumeGo = document.getElementById("pawResumeGo");
    const DRAFT_KEY = "paw:presence:draft:v1";
    const MAX_DRAFT_HISTORY_ITEMS = 30;
    const MAX_DRAFT_SHELL_INPUT_CHARS = 8000;
    const CONTENT_TYPE_MAP = {
      bio: "bio_about_me",
      social_post: "social_content",
      article: "authority_content",
      guide: "guide_related_content",
      other: "other"
    };

    const PRESENCE_SECONDARY_CONFIG = {
      bio: {
        label: "Choose a length",
        options: [
          { value: "short", label: "Short" },
          { value: "standard", label: "Standard" },
          { value: "long", label: "Long" }
        ]
      },
      social_post: {
        label: "Choose a focus",
        options: [
          { value: "listing", label: "Listing" },
          { value: "local", label: "Local" },
          { value: "educational", label: "Educational" },
          { value: "brand", label: "Brand" },
          { value: "guide", label: "Guide" }
        ]
      },
      article: {
        label: "Choose a focus",
        options: [
          { value: "market", label: "Market" },
          { value: "local", label: "Local" },
          { value: "educational", label: "Educational" },
          { value: "agent_story", label: "Agent Story" }
        ]
      },
      guide: {
        label: "Choose a focus",
        options: [
          { value: "buying", label: "Buying" },
          { value: "selling", label: "Selling" },
          { value: "local_area", label: "Local Area" },
          { value: "process", label: "Process" }
        ]
      }
    };

    const presenceState = {
      primary: "",
      secondary: "",
      otherText: ""
    };

    function trunc(value, max) {
      const text = String(value == null ? "" : value);
      return text.length > max ? text.slice(0, max) : text;
    }

    function storageGet(key) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (_) { return null; }
    }

    function storageSet(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); return true; } catch (_) { return false; }
    }

    function storageDel(key) {
      try { localStorage.removeItem(key); return true; } catch (_) { return false; }
    }

    function getPresenceContentType() {
      return CONTENT_TYPE_MAP[presenceState.primary] || "";
    }

    function getMissingPresenceGroups() {
      const missing = [];

      if (!presenceState.primary) missing.push("primary");

      if (presenceState.primary && PRESENCE_SECONDARY_CONFIG[presenceState.primary] && !presenceState.secondary) {
        missing.push("secondary");
      }

      if (presenceState.primary === "other" && !String(presenceState.otherText || "").trim()) {
        missing.push("other");
      }

      return missing;
    }

    function updatePresenceValidationState() {
      const missingGroups = getMissingPresenceGroups();

      document.querySelectorAll(".presence-block[data-presence-group]").forEach((block) => {
        const group = String(block.getAttribute("data-presence-group") || "");
        const isMissing = showPresenceValidation && missingGroups.indexOf(group) !== -1;
        block.classList.toggle("presence-block--missing", isMissing);
      });
    }

    function focusFirstMissingPresenceGroup(group) {
      if (!group) return;

      let target = null;
      if (group === "primary") target = document.querySelector("[data-presence-primary]");
      if (group === "secondary") target = document.querySelector("[data-presence-secondary]");
      if (group === "other") target = document.getElementById("presenceOtherText");

      if (target && typeof target.focus === "function") target.focus();
    }

    function syncPresenceChoiceUI() {
      try {
        document.querySelectorAll("[data-presence-primary]").forEach((button) => {
          const isSelected = String(button.getAttribute("data-presence-primary") || "") === presenceState.primary;
          button.classList.toggle("is-selected", isSelected);
          button.setAttribute("aria-pressed", isSelected ? "true" : "false");
        });

        document.querySelectorAll("[data-presence-secondary]").forEach((button) => {
          const isSelected = String(button.getAttribute("data-presence-secondary") || "") === presenceState.secondary;
          button.classList.toggle("is-selected", isSelected);
          button.setAttribute("aria-pressed", isSelected ? "true" : "false");
        });
      } catch (_) {}
    }

    function notifyPresenceLayoutChange() {
      try {
        window.dispatchEvent(new Event("resize"));
      } catch (_) {}
    }

    function renderPresenceControls() {
      const secondaryBlock = document.getElementById("presenceSecondaryBlock");
      const secondaryLabel = document.getElementById("presenceSecondaryLabel");
      const secondaryGroup = document.getElementById("presenceSecondaryGroup");
      const otherBlock = document.getElementById("presenceOtherBlock");
      const otherInput = document.getElementById("presenceOtherText");
      const secondaryConfig = PRESENCE_SECONDARY_CONFIG[presenceState.primary] || null;

      if (secondaryBlock) secondaryBlock.hidden = !secondaryConfig;
      if (otherBlock) otherBlock.hidden = presenceState.primary !== "other";

      if (secondaryLabel) {
        secondaryLabel.textContent = secondaryConfig ? secondaryConfig.label : "Choose a focus";
      }

      if (secondaryGroup) {
        if (secondaryConfig) {
          secondaryGroup.innerHTML = secondaryConfig.options.map((option) => (
            '<button class="btn presence-choice" type="button" data-presence-secondary="' + option.value + '" aria-pressed="false">' +
              option.label +
            "</button>"
          )).join("");
        } else {
          secondaryGroup.innerHTML = "";
        }
      }

      if (otherInput) otherInput.value = presenceState.otherText;

      try {
        document.querySelectorAll("[data-presence-secondary]").forEach((button) => {
          button.addEventListener("click", function () {
            presenceState.secondary = String(button.getAttribute("data-presence-secondary") || "");
            if (getMissingPresenceGroups().length === 0) {
              showPresenceValidation = false;
            }
            syncPresenceChoiceUI();
            updatePresenceValidationState();
            scheduleDraftSave();
          });
        });
      } catch (_) {}

      syncPresenceChoiceUI();
      updatePresenceValidationState();
      notifyPresenceLayoutChange();
    }

    function resetPresenceControls() {
      presenceState.primary = "";
      presenceState.secondary = "";
      presenceState.otherText = "";
      renderPresenceControls();
    }

    function initPresenceControls() {
      const primaryButtons = Array.from(document.querySelectorAll("[data-presence-primary]"));
      const otherInput = document.getElementById("presenceOtherText");
      const resetButton = document.getElementById("reset");

      primaryButtons.forEach((button) => {
        button.addEventListener("click", function () {
          const nextPrimary = String(button.getAttribute("data-presence-primary") || "");
          if (nextPrimary !== presenceState.primary) {
            presenceState.primary = nextPrimary;
            presenceState.secondary = "";
          }
          if (nextPrimary !== "other") presenceState.otherText = "";
          if (getMissingPresenceGroups().length === 0) {
            showPresenceValidation = false;
          }
          renderPresenceControls();
          scheduleDraftSave();
        });
      });

      if (otherInput) {
        otherInput.addEventListener("input", function () {
          presenceState.otherText = String(otherInput.value || "");
          if (getMissingPresenceGroups().length === 0) {
            showPresenceValidation = false;
          }
          updatePresenceValidationState();
          scheduleDraftSave();
        });
      }

      if (resetButton) {
        resetButton.addEventListener("click", function () {
          showPresenceValidation = false;
          resetPresenceControls();
        });
      }

      renderPresenceControls();
    }

    initPresenceControls();

    // PAW Tool Shell init (required for consistent My Works mode across tools)
    let shell = null;
    try {
      if (window.PAWToolShell && window.PAWToolShell.init) {
        shell = window.PAWToolShell.init({
          apiEndpoint: API_ENDPOINT,
          toolId: "presence",
          beforeSend: () => {
            const missingGroups = getMissingPresenceGroups();
            if (!missingGroups.length) return null;

            showPresenceValidation = true;
            updatePresenceValidationState();
            focusFirstMissingPresenceGroup(missingGroups[0]);
            return { cancel: true };
          },
          getPrefs: () => ({
            content_type: getPresenceContentType(),
            content_other: presenceState.primary === "other" ? String(presenceState.otherText || "").trim() : ""
          }),
          onResponse: function () {
            try { setTimeout(saveDraftNow, 0); } catch (_) {}
          }
        });
      }
    } catch (_) {}

    function buildDraft() {
      const rawShellState = (shell && shell.getState) ? shell.getState() : { history: [], input: "" };
      const shellState = {
        history: Array.isArray(rawShellState.history) ? rawShellState.history.slice(-MAX_DRAFT_HISTORY_ITEMS) : [],
        input: trunc(rawShellState.input, MAX_DRAFT_SHELL_INPUT_CHARS)
      };

      return {
        v: 1,
        updatedAt: new Date().toISOString(),
        toolId: "presence",
        presence: {
          primary: presenceState.primary,
          secondary: presenceState.secondary,
          otherText: presenceState.otherText
        },
        shell: shellState
      };
    }

    function saveDraftNow() {
      try {
        const d = buildDraft();
        const hasAny =
          (d.presence && Object.values(d.presence).some((v) => String(v || "").trim())) ||
          (d.shell && Array.isArray(d.shell.history) && d.shell.history.length) ||
          (d.shell && typeof d.shell.input === "string" && d.shell.input.trim().length);

        if (!hasAny) {
          storageDel(DRAFT_KEY);
          return;
        }

        storageSet(DRAFT_KEY, d);
      } catch (_) {}
    }

    let __draftSaveT = null;
    function scheduleDraftSave() {
      try { clearTimeout(__draftSaveT); } catch (_) {}
      __draftSaveT = setTimeout(saveDraftNow, 350);
    }

    function openResumeModal(draft) {
      try {
        if (!$resumeModal) return;
        const d = draft || {};
        const ts = d.updatedAt ? new Date(d.updatedAt) : null;
        const when = ts && !isNaN(ts.getTime()) ? ts.toLocaleString() : "";
        $resumeMeta.textContent = `We found a saved Presence draft on this device.` + (when ? ` Last saved: ${when}.` : "");
        $resumeModal.classList.add("show");
        $resumeModal.setAttribute("aria-hidden", "false");
      } catch (_) {}
    }

    function closeResumeModal() {
      try {
        if (!$resumeModal) return;
        $resumeModal.classList.remove("show");
        $resumeModal.setAttribute("aria-hidden", "true");
      } catch (_) {}
    }

    function applyDraft(draft) {
      const d = draft && typeof draft === "object" ? draft : null;
      if (!d) return false;

      try {
        // Restore only Presence page state here.
        // The shared shell rebuilds chat/composer state separately, and the shared
        // Work button must keep coming from tool-shell.js instead of Presence.
        const p = d.presence || {};
        presenceState.primary = String(p.primary || "");
        presenceState.secondary = String(p.secondary || "");
        presenceState.otherText = String(p.otherText || "");
        showPresenceValidation = false;
        renderPresenceControls();
        closeResumeModal();
        if (d.shell && shell && shell.setState) shell.setState(d.shell);
        return true;
      } catch (_) {
        return false;
      }
    }

    function fullResetPresence() {
      // This is Presence's page-level hard reset.
      // The shared Work button and Works mode live in tool-shell.js, so Presence must
      // only clear page state and call the shared shell APIs in the correct order.
      try { storageDel(DRAFT_KEY); } catch (_) {}

      // Closing the resume prompt first avoids stale restore UI after a hard reset.
      closeResumeModal();

      // Reset the shared shell second so chat/composer state is rebuilt by the shell,
      // not by Presence trying to duplicate shared behavior locally.
      try { if (shell && shell.reset) shell.reset(); } catch (_) {}

      // Detached Work must be cleared during a true hard reset.
      // Work attachment state is shared shell behavior, so Presence should only ask
      // the shared API to detach and should not rewire the Work button itself.
      try {
        if (window.__PAWWorks && window.__PAWWorks.detachWork) {
          window.__PAWWorks.detachWork();
        }
      } catch (_) {}

      // Rebuild Presence-only controls last so the page lands in a clean fresh state.
      showPresenceValidation = false;
      resetPresenceControls();
    }

    try {
      const $prompt = document.getElementById("prompt");
      if ($prompt) {
        $prompt.addEventListener("input", scheduleDraftSave);
        $prompt.addEventListener("change", scheduleDraftSave);
      }
    } catch (_) {}

    window.addEventListener("beforeunload", () => { try { saveDraftNow(); } catch (_) {} });

    try {
      const $reset = document.getElementById("reset");
      if ($reset) {
        // The reset order is intentional.
        // Presence handles its hard reset here in capture phase so we do not partially
        // clear local state and then let later listeners re-run shared reset behavior
        // out of order. Future changes should keep Work button logic in the shared shell.
        $reset.addEventListener("click", function (e) {
          try { e.preventDefault(); e.stopImmediatePropagation(); } catch (_) {}
          fullResetPresence();
        }, true);
      }
    } catch (_) {}

    try { if ($resumeClose) $resumeClose.addEventListener("click", () => closeResumeModal()); } catch (_) {}
    try {
      if ($resumeModal) $resumeModal.addEventListener("click", (e) => { if (e.target === $resumeModal) closeResumeModal(); });
    } catch (_) {}
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeResumeModal(); } });

    try {
      if ($resumeFresh) $resumeFresh.addEventListener("click", () => {
        // "Start fresh" must use the same hard reset path as the Reset button so
        // draft state, shell state, and detached Work state cannot drift apart.
        closeResumeModal();
        fullResetPresence();
      });
    } catch (_) {}

    try {
      if ($resumeGo) $resumeGo.addEventListener("click", () => {
        const d = storageGet(DRAFT_KEY);
        closeResumeModal();
        if (d) applyDraft(d);
      });
    } catch (_) {}

    const existingDraft = storageGet(DRAFT_KEY);
    if (existingDraft) openResumeModal(existingDraft);
  </script>

  <!-- ==========================================================
       PAW Iframe Height Reporter (v1.1 - loop-safe, STANDARD)
       ----------------------------------------------------------
       PURPOSE:
       - Reports the tool's visible panel height to the Circle parent page.
       - Enables "grow-to-fit" embeds with no internal scrollbars.
       - STANDARDIZED across all tools so Work: Ready behaves identically everywhere.
       CONTRACT:
       - Sends: { type: "paw_iframe_height_request_v1", height: <number> }
       ========================================================== -->
  <script>
    (function () {
      if (window.__PAW_HEIGHT_REPORTER_V11__) return;
      window.__PAW_HEIGHT_REPORTER_V11__ = true;

      var lastSent = 0;
      var rafPending = false;
      var IGNORE_DELTA_PX = 8;

      function px(n){ n = Number(n); return isFinite(n) ? n : 0; }

      function measureContentHeight() {
        try {
          // Prefer the visible "panel" container (consistent across PAW tools)
          var panel = document.querySelector(".panel");
          if (panel && panel.getBoundingClientRect) {
            var r = panel.getBoundingClientRect();
            return Math.ceil(px(r.height));
          }

          // Fallback: sum key areas if present
          var topbar = document.querySelector(".panel-topbar");
          var messages = document.getElementById("messages") || document.querySelector(".messages");
          var composer = document.querySelector(".composer");

          var h = 0;
          if (topbar && topbar.getBoundingClientRect) h += px(topbar.getBoundingClientRect().height);
          if (messages && messages.getBoundingClientRect) h += px(messages.getBoundingClientRect().height);
          if (composer && composer.getBoundingClientRect) h += px(composer.getBoundingClientRect().height);

          if (h > 0) return Math.ceil(h);

          // Last-resort fallback (for simpler layouts)
          var d = document.documentElement;
          return Math.ceil(Math.max(px(d.scrollHeight), px(d.offsetHeight)));
        } catch (_) {
          return 0;
        }
      }

      function postHeight(force) {
        var h = measureContentHeight();
        if (!h) return;

        if (!force && Math.abs(h - lastSent) < IGNORE_DELTA_PX) return;
        lastSent = h;

        try {
          window.parent.postMessage(
            { type: "paw_iframe_height_request_v1", height: h },
            "*"
          );
        } catch (_) {}
      }

      function schedule(force) {
        if (rafPending) return;
        rafPending = true;
        requestAnimationFrame(function () {
          rafPending = false;
          postHeight(!!force);
        });
      }

      // Initial + settle passes (fonts/images/layout settle)
      schedule(true);
      setTimeout(function(){ schedule(true); }, 120);
      setTimeout(function(){ schedule(true); }, 400);

      // DOM changes (chat streaming, Work mode swap, modal open/close, etc.)
      try {
        var mo = new MutationObserver(function(){ schedule(false); });
        mo.observe(document.body, { childList:true, subtree:true, characterData:true });
      } catch (_) {}

      // Images loading after insertion
      document.addEventListener("load", function(e){
        try { if (e.target && e.target.tagName === "IMG") schedule(false); } catch (_) {}
      }, true);

      // Resize/orientation/keyboard changes
      window.addEventListener("resize", function(){ schedule(true); });
    })();
  </script>

</body>
