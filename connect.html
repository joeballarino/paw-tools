<!doctype html>
<html lang="en">
<head>
<!--
    PAW Embed Guard (required):
    These tool pages are built for Circle embedding.
    If someone opens this page directly (not in an iframe), redirect to proagentworks.com.
    Keep this lightweight; no dependencies.
  -->
<script>
    (function () {
      try {
        if (window.top === window.self) {
          window.location.replace("https://proagentworks.com");
        }
      } catch (e) {
        // If cross-origin framing prevents access to window.top, fail closed.
        window.location.replace("https://proagentworks.com");
      }
    })();
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connect</title>
  <link rel="stylesheet" href="./paw-ui.css">

  <script>
    // PAW Embed Mode Guard
    // -------------------
    // Circle provides the outer card. The embedded tool must render "flat".
    // We rely on paw-ui.css rules that activate when html[data-embed="1"] is present.
    // tool-shell.js will set this when initialized, but this UI scaffold does not
    // depend on shell init yet, so we set it here as well.
    (function(){
      try{
        var params = new URLSearchParams(window.location.search);
        var isEmbedParam = params.get('embed') === '1';
        var isInIframe = (function(){ try{ return window.self !== window.top; } catch(e){ return true; } })();
        if(isEmbedParam || isInIframe){
          document.documentElement.setAttribute('data-embed','1');
        }
      }catch(e){}
    })();
  </script>

  <!--
    ProAgent Works — Connect (EMBED TOOL)
    ------------------------------------
    PURPOSE (v1 UI scaffold):
    - This file is the Circle-embedded UI for the Connect communication tool.
    - In this step we are intentionally shipping the UI skeleton first so it can be reviewed
      inside Circle before wiring to the Cloudflare Worker.

    IMPORTANT PRODUCT RULES (locked for PAW tools):
    - Circle owns the tool title. The embedded tool MUST NOT render its own title.
    - The panel top bar (.topbar-row0) contains:
        subtitle/description (left) + Reset/Tips buttons (right)
      ...and NOTHING ELSE.
    - Embed mode:
        tool-shell.js sets html[data-embed="1"] when ?embed=1 is present or when inside an iframe.
        paw-ui.css flattens the panel in embed mode so Circle provides the outer card.

    WIRING NOTE:
    - NO AI logic lives here. All model prompting + output generation will be done by the Worker.
    - This UI currently provides:
        * button-state controls (Type / Send via / Use as)
        * message/context textarea + Generate button
        * message feed area (same shell structure as other tools)
      The Generate button is stubbed for now (it adds a local placeholder message).

    FUTURE ASSISTANTS:
    - When wiring begins, reuse the proven patterns from listing.html and ask.html:
        * shell state (tool-shell.js)
        * reset contract (full reset clears UI + deletes draft)
        * resume modal + autosave (if we decide to keep it consistent with Listing)
  -->
  <style>
    /* ==========================================================
       PAW Connect — Segmented Controls (v2)
       ----------------------------------------------------------
       GOAL:
       - Make each binary choice feel like ONE connected control
         (Choose one / Send via / Use as)
       - Desktop: label inline with segmented control
       - Mobile: label stacked above full-width segmented control
       - Scoped to Connect only (no shared CSS changes yet)

       NOTE FOR FUTURE ASSISTANTS:
       - If we decide to standardize this across tools, migrate these
         styles into paw-ui.css as a reusable component (e.g. .paw-seg2).
       ========================================================== */

    .connect-controls{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:12px 18px 12px;
      border-bottom:1px solid var(--border-soft);
    }

    .connect-row{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:nowrap;
    }

    .connect-block{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .connect-label{
      font-size:12px;
      font-weight:800;
      color:rgba(15,23,42,.72);
      letter-spacing:-0.01em;
      margin-right:2px;
      white-space:nowrap;
    }

    /* Segmented pill container */
    .connect-seg{
      display:flex;
      align-items:center;
      gap:0;
    }

    .connect-seg-btn{
      min-width:0;
      height:32px;
      padding:0 14px;
      white-space:nowrap;
    }

    .connect-seg-btn.is-selected,
    .connect-seg-btn[aria-pressed="true"]{
      background:rgba(5,195,249,.18);
      color:rgba(15,23,42,.92);
      box-shadow:inset 0 0 0 1px rgba(15,23,42,.08);
    }

    .connect-block--missing .connect-label{
      color:rgba(153,27,27,.84);
    }

    .connect-block--missing .connect-seg{
      box-shadow:0 0 0 1px rgba(220,38,38,.22);
      border-radius:999px;
      background:rgba(254,242,242,.85);
    }

    .connect-helper{
      font-size:12px;
      font-weight:700;
      color:rgba(15,23,42,.62);
      padding:0 18px 12px;
    }

    .connect-helper.is-error{
      color:rgba(153,27,27,.84);
    }

    .connect-controls .connect-block { flex: 0 0 auto; }

    @media (max-width: 1040px){
      .connect-row{
        flex-wrap:wrap;
      }
    }

    /* Mobile: stack each block, full-width segmented control */
    @media (max-width: 560px){
      .connect-controls{ padding:10px 12px 12px; }
      .connect-row{
        flex-direction:column;
        align-items:stretch;
        gap:12px;
      }
      .connect-block{
        flex-direction:column;
        align-items:flex-start;
        gap:6px;
        width:100%;
      }
      .connect-seg.paw-seg.paw-seg--compact{ width:100%; display:flex; }
      .connect-seg.paw-seg.paw-seg--compact .paw-seg__btn{ flex:1 1 0; }
    }
</style>
</head>

<body>
  <div class="app">
    <div class="frame">
      <div class="panel">

        <div class="panel-topbar">
          <div class="topbar-row0">
            <div class="tool-head">
              <button id="pawMyStuffBtn" class="paw-mystuff-btn paw-works-btn" type="button" aria-label="Work context">
                <img class="works-paw" src="https://paw-tools.pages.dev/paw.png" alt="" aria-hidden="true">
                <span class="works-label">Work</span>
                <span class="works-chevron" aria-hidden="true">▾</span>
              </button>
            </div>

            

            <div class="topbar-right">
  

              <div class="utility-pair paw-seg" role="group" aria-label="Tool utilities">
                <button id="reset" class="util-btn paw-seg__btn" type="button">Reset</button>
                <button id="tips" class="util-btn paw-seg__btn" type="button">Tips &amp; How To</button>
              </div>
            </div>
          </div>

          <!-- Settings (connected segmented controls) -->
<div class="connect-controls" aria-label="Connect settings">
  <div class="connect-row" aria-label="Connect settings">

    <div class="connect-block" data-connect-group="type">
      <div class="connect-label">Choose one</div>
      <div class="connect-seg paw-seg paw-seg--compact" role="group" aria-label="Type">
        <button class="connect-seg-btn paw-seg__btn" type="button" data-group="type" data-value="first_contact">First contact</button>
        <button class="connect-seg-btn paw-seg__btn" type="button" data-group="type" data-value="continue">Continue</button>
      </div>
    </div>

    <div class="connect-block" data-connect-group="channel">
      <div class="connect-label">Send via</div>
      <div class="connect-seg paw-seg paw-seg--compact" role="group" aria-label="Send via">
        <button class="connect-seg-btn paw-seg__btn" type="button" data-group="channel" data-value="email">Email</button>
        <button class="connect-seg-btn paw-seg__btn" type="button" data-group="channel" data-value="text">Text</button>
      </div>
    </div>

    <div class="connect-block" data-connect-group="use">
      <div class="connect-label">Use as</div>
      <div class="connect-seg paw-seg paw-seg--compact" role="group" aria-label="Use as">
        <button class="connect-seg-btn paw-seg__btn" type="button" data-group="use" data-value="once">Send once</button>
        <button class="connect-seg-btn paw-seg__btn" type="button" data-group="use" data-value="template">Template</button>
      </div>
    </div>

  </div>
</div>
<div id="connectHelper" class="connect-helper" aria-live="polite">Choose type, channel, and use before sending.</div>
<!-- Message feed (same structure as Listing/Ask so tool-shell can manage it later) -->
        <div id="messages" class="messages" aria-live="polite"></div>

        <!-- Composer -->
        <div class="composer">
          
          <div class="composer-main">
            <div class="composer-help">Paste their message + tell PAW what you want to happen.</div>
            <textarea id="prompt" class="prompt" placeholder="Example: Reply to “we’re waiting” and book a quick call"></textarea>
          </div>

          <button id="send" class="send" aria-label="Generate message" type="button">
            <img src="https://paw-tools.pages.dev/paw.png" class="send-icon" alt="">
          </button>
        </div>

      </div>
    </div>
  </div>

  <div id="pawResumeModal" class="modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="pawResumeTitle">
      <div class="modal-head">
        <div id="pawResumeTitle" class="modal-title">Resume draft?</div>
        <button class="modal-close" id="pawResumeClose" aria-label="Close" type="button">✕</button>
      </div>
      <div class="modal-body">
        <div id="pawResumeMeta" style="font-size:14px; color:rgba(15,23,42,.86); line-height:1.45; margin-bottom:14px;">
          We found a saved draft on this device.
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <button id="pawResumeFresh" class="btn" type="button">Start fresh</button>
          <button id="pawResumeGo" class="btn primary" type="button">Resume</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/tool-shell.js"></script>
  <script>
    const API_ENDPOINT = "https://paw-api.joe-b40.workers.dev";
    let showConnectValidation = false;

    const $resumeModal = document.getElementById("pawResumeModal");
    const $resumeClose = document.getElementById("pawResumeClose");
    const $resumeMeta = document.getElementById("pawResumeMeta");
    const $resumeFresh = document.getElementById("pawResumeFresh");
    const $resumeGo = document.getElementById("pawResumeGo");

    const DRAFT_KEY = "paw:connect:draft:v1";
    const MAX_DRAFT_HISTORY_ITEMS = 30;
    const MAX_DRAFT_SHELL_INPUT_CHARS = 8000;
    function prefsKeyForGroup(group) {
      if (group === "type") return "connect_type";
      if (group === "channel") return "connect_channel";
      return "connect_use";
    }

    function readInitialConnectValue(group) {
      try {
        const buttons = Array.from(document.querySelectorAll('.connect-seg-btn[data-group="' + String(group || "") + '"][data-value]'));
        const active = buttons.find((btn) => (
          btn.getAttribute("aria-pressed") === "true" ||
          btn.classList.contains("is-selected") ||
          btn.classList.contains("primary")
        ));
        return active ? String(active.getAttribute("data-value") || "") : "";
      } catch (_) {
        return "";
      }
    }

    function trunc(s, max) {
      s = (s == null) ? "" : String(s);
      if (!max || max <= 0) return "";
      return s.length > max ? s.slice(0, max) : s;
    }

    function storageGet(key) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (_) { return null; }
    }

    function storageSet(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); return true; } catch (_) { return false; }
    }

    function storageDel(key) {
      try { localStorage.removeItem(key); return true; } catch (_) { return false; }
    }
    const INITIAL_CONNECT_STATE = {
      connect_type: readInitialConnectValue("type"),
      connect_channel: readInitialConnectValue("channel"),
      connect_use: readInitialConnectValue("use")
    };

    const connectState = {
      connect_type: INITIAL_CONNECT_STATE.connect_type,
      connect_channel: INITIAL_CONNECT_STATE.connect_channel,
      connect_use: INITIAL_CONNECT_STATE.connect_use
    };

    function getMissingConnectGroups() {
      return ["type", "channel", "use"].filter(function (group) {
        return !connectState[prefsKeyForGroup(group)];
      });
    }

    function updateConnectHelperState() {
      const missingGroups = getMissingConnectGroups();
      const helper = document.getElementById("connectHelper");

      if (helper) {
        helper.classList.toggle("is-error", showConnectValidation && missingGroups.length > 0);
      }

      document.querySelectorAll(".connect-block[data-connect-group]").forEach(function (block) {
        const group = block.getAttribute("data-connect-group") || "";
        const isMissing = showConnectValidation && missingGroups.indexOf(group) !== -1;
        block.classList.toggle("connect-block--missing", isMissing);
      });
    }

    function focusFirstMissingConnectGroup(group) {
      if (!group) return;
      const target = document.querySelector('.connect-seg-btn[data-group="' + group + '"]');
      if (target && typeof target.focus === "function") {
        target.focus();
      }
    }

    function applyConnectChoiceUI() {
      try {
        Array.from(document.querySelectorAll(".connect-seg-btn[data-group][data-value]")).forEach((btn) => {
          const group = String(btn.getAttribute("data-group") || "");
          const value = String(btn.getAttribute("data-value") || "");
          const selected =
            (group === "type" && value === connectState.connect_type) ||
            (group === "channel" && value === connectState.connect_channel) ||
            (group === "use" && value === connectState.connect_use);

          btn.classList.toggle("is-selected", selected);
          btn.setAttribute("aria-pressed", selected ? "true" : "false");
        });
      } catch (_) {}
      updateConnectHelperState();
    }

    function setConnectChoice(group, value) {
      const key = prefsKeyForGroup(group);
      const nextValue = String(value || "");
      if (!key) return;
      connectState[key] = nextValue;
      if (getMissingConnectGroups().length === 0) {
        showConnectValidation = false;
      }
      applyConnectChoiceUI();
      scheduleDraftSave();
    }

    function getConnectDeliverableMeta() {
      return {
        type: connectState.connect_type,
        channel: connectState.connect_channel,
        use: connectState.connect_use
      };
    }
    // PAW Tool Shell init (required for consistent My Works mode across tools)
    let shell = null;
    try {
      if (window.PAWToolShell && window.PAWToolShell.init) {
        shell = window.PAWToolShell.init({
          apiEndpoint: API_ENDPOINT,
          toolId: "connect",
          beforeSend: function () {
            const missingGroups = getMissingConnectGroups();
            if (!missingGroups.length) return null;

            showConnectValidation = true;
            updateConnectHelperState();
            focusFirstMissingConnectGroup(missingGroups[0]);
            return { cancel: true };
          },
          getPrefs: function () {
            return {
              connect_type: connectState.connect_type,
              connect_channel: connectState.connect_channel,
              connect_use: connectState.connect_use
            };
          },
          getDeliverableMeta: getConnectDeliverableMeta,
          onResponse: function () {
            try { setTimeout(saveDraftNow, 0); } catch (_) {}
          }
        });
      }
    } catch (_) {}

    function buildDraft() {
      const rawShellState = (shell && shell.getState) ? shell.getState() : { history: [], input: "" };
      const shellState = {
        history: Array.isArray(rawShellState.history) ? rawShellState.history.slice(-MAX_DRAFT_HISTORY_ITEMS) : [],
        input: trunc(rawShellState.input, MAX_DRAFT_SHELL_INPUT_CHARS)
      };

      return {
        v: 1,
        updatedAt: new Date().toISOString(),
        toolId: "connect",
        connect: {
          connect_type: connectState.connect_type,
          connect_channel: connectState.connect_channel,
          connect_use: connectState.connect_use
        },
        shell: shellState
      };
    }

    function saveDraftNow() {
      try {
        const d = buildDraft();
        const hasAny =
          (d.connect && Object.values(d.connect).some((v) => String(v || "").trim())) ||
          (d.shell && Array.isArray(d.shell.history) && d.shell.history.length) ||
          (d.shell && typeof d.shell.input === "string" && d.shell.input.trim().length);

        if (!hasAny) {
          storageDel(DRAFT_KEY);
          return;
        }

        storageSet(DRAFT_KEY, d);
      } catch (_) {}
    }

    let __draftSaveT = null;

    function scheduleDraftSave() {
      try {
        if (__draftSaveT) clearTimeout(__draftSaveT);
        __draftSaveT = setTimeout(saveDraftNow, 350);
      } catch (_) {}
    }

    function openResumeModal(draft) {
      try {
        if (!$resumeModal) return;
        const d = draft || {};
        const ts = d.updatedAt ? new Date(d.updatedAt) : null;
        const when = ts && !isNaN(ts.getTime()) ? ts.toLocaleString() : "";
        $resumeMeta.textContent = `We found a saved Connect draft on this device.` + (when ? ` Last saved: ${when}.` : "");
        $resumeModal.classList.add("show");
        $resumeModal.setAttribute("aria-hidden", "false");
      } catch (_) {}
    }

    function closeResumeModal() {
      try {
        if (!$resumeModal) return;
        $resumeModal.classList.remove("show");
        $resumeModal.setAttribute("aria-hidden", "true");
      } catch (_) {}
    }

    function applyDraft(draft) {
      const d = draft && typeof draft === "object" ? draft : null;
      if (!d) return false;

      try {
        const c = d.connect || {};
        connectState.connect_type = String(c.connect_type || INITIAL_CONNECT_STATE.connect_type || "");
        connectState.connect_channel = String(c.connect_channel || INITIAL_CONNECT_STATE.connect_channel || "");
        connectState.connect_use = String(c.connect_use || INITIAL_CONNECT_STATE.connect_use || "");
        showConnectValidation = false;
        applyConnectChoiceUI();
        closeResumeModal();
        if (d.shell && shell && shell.setState) shell.setState(d.shell);
        return true;
      } catch (_) {
        return false;
      }
    }

    function fullResetConnect() {
      try { storageDel(DRAFT_KEY); } catch (_) {}
      closeResumeModal();
      try { if (shell && shell.reset) shell.reset(); } catch (_) {}
      try {
        if (window.__PAWWorks && window.__PAWWorks.detachWork) {
          window.__PAWWorks.detachWork();
        }
      } catch (_) {}
      connectState.connect_type = INITIAL_CONNECT_STATE.connect_type;
      connectState.connect_channel = INITIAL_CONNECT_STATE.connect_channel;
      connectState.connect_use = INITIAL_CONNECT_STATE.connect_use;
      showConnectValidation = false;
      applyConnectChoiceUI();
    }
    try {
      Array.from(document.querySelectorAll(".connect-seg-btn[data-group][data-value]")).forEach((btn) => {
        btn.addEventListener("click", function () {
          setConnectChoice(
            String(btn.getAttribute("data-group") || ""),
            String(btn.getAttribute("data-value") || "")
          );
        });
      });
    } catch (_) {}

    applyConnectChoiceUI();

    try {
      const $prompt = document.getElementById("prompt");
      if ($prompt) {
        $prompt.addEventListener("input", scheduleDraftSave);
        $prompt.addEventListener("change", scheduleDraftSave);
      }
    } catch (_) {}

    window.addEventListener("beforeunload", () => { try { saveDraftNow(); } catch (_) {} });

    try {
      const $reset = document.getElementById("reset");
      if ($reset) {
        $reset.addEventListener("click", function (e) {
          try { e.preventDefault(); e.stopImmediatePropagation(); } catch (_) {}
          fullResetConnect();
        }, true);
      }
    } catch (_) {}

    try { if ($resumeClose) $resumeClose.addEventListener("click", () => closeResumeModal()); } catch (_) {}
    try {
      if ($resumeModal) $resumeModal.addEventListener("click", (e) => { if (e.target === $resumeModal) closeResumeModal(); });
    } catch (_) {}
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeResumeModal(); } });

    try {
      if ($resumeFresh) $resumeFresh.addEventListener("click", () => {
        closeResumeModal();
        fullResetConnect();
      });
    } catch (_) {}

    try {
      if ($resumeGo) $resumeGo.addEventListener("click", () => {
        const d = storageGet(DRAFT_KEY);
        closeResumeModal();
        if (d) applyDraft(d);
      });
    } catch (_) {}

    const existingDraft = storageGet(DRAFT_KEY);
    if (existingDraft) openResumeModal(existingDraft);
  </script>

  <!-- ==========================================================
       PAW Iframe Height Reporter (v1.1 - loop-safe, STANDARD)
       ----------------------------------------------------------
       PURPOSE:
       - Reports the tool's visible panel height to the Circle parent page.
       - Enables "grow-to-fit" embeds with no internal scrollbars.
       - STANDARDIZED across all tools so Work: Ready behaves identically everywhere.
       CONTRACT:
       - Sends: { type: "paw_iframe_height_request_v1", height: <number> }
       ========================================================== -->
  <script>
    (function () {
      if (window.__PAW_HEIGHT_REPORTER_V11__) return;
      window.__PAW_HEIGHT_REPORTER_V11__ = true;

      var lastSent = 0;
      var rafPending = false;
      var IGNORE_DELTA_PX = 8;

      function px(n){ n = Number(n); return isFinite(n) ? n : 0; }

      function measureContentHeight() {
        try {
          // Prefer the visible "panel" container (consistent across PAW tools)
          var panel = document.querySelector(".panel");
          if (panel && panel.getBoundingClientRect) {
            var r = panel.getBoundingClientRect();
            return Math.ceil(px(r.height));
          }

          // Fallback: sum key areas if present
          var topbar = document.querySelector(".panel-topbar");
          var messages = document.getElementById("messages") || document.querySelector(".messages");
          var composer = document.querySelector(".composer");

          var h = 0;
          if (topbar && topbar.getBoundingClientRect) h += px(topbar.getBoundingClientRect().height);
          if (messages && messages.getBoundingClientRect) h += px(messages.getBoundingClientRect().height);
          if (composer && composer.getBoundingClientRect) h += px(composer.getBoundingClientRect().height);

          if (h > 0) return Math.ceil(h);

          // Last-resort fallback (for simpler layouts)
          var d = document.documentElement;
          return Math.ceil(Math.max(px(d.scrollHeight), px(d.offsetHeight)));
        } catch (_) {
          return 0;
        }
      }

      function postHeight(force) {
        var h = measureContentHeight();
        if (!h) return;

        if (!force && Math.abs(h - lastSent) < IGNORE_DELTA_PX) return;
        lastSent = h;

        try {
          window.parent.postMessage(
            { type: "paw_iframe_height_request_v1", height: h },
            "*"
          );
        } catch (_) {}
      }

      function schedule(force) {
        if (rafPending) return;
        rafPending = true;
        requestAnimationFrame(function () {
          rafPending = false;
          postHeight(!!force);
        });
      }

      // Initial + settle passes (fonts/images/layout settle)
      schedule(true);
      setTimeout(function(){ schedule(true); }, 120);
      setTimeout(function(){ schedule(true); }, 400);

      // DOM changes (chat streaming, Work mode swap, modal open/close, etc.)
      try {
        var mo = new MutationObserver(function(){ schedule(false); });
        mo.observe(document.body, { childList:true, subtree:true, characterData:true });
      } catch (_) {}

      // Images loading after insertion
      document.addEventListener("load", function(e){
        try { if (e.target && e.target.tagName === "IMG") schedule(false); } catch (_) {}
      }, true);

      // Resize/orientation/keyboard changes
      window.addEventListener("resize", function(){ schedule(true); });
    })();
  </script>

</body>
</html>
