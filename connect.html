<!--
    PAW Embed Guard (required):
    These tool pages are built for Circle embedding.
    If someone opens this page directly (not in an iframe), redirect to proagentworks.com.
    Keep this lightweight; no dependencies.
  -->
<script>
    (function () {
      try {
        if (window.top === window.self) {
          window.location.replace("https://proagentworks.com");
        }
      } catch (e) {
        // If cross-origin framing prevents access to window.top, fail closed.
        window.location.replace("https://proagentworks.com");
      }
    })();
  </script>

  <script>
    // PAW Embed Mode Guard
    // -------------------
    // Circle provides the outer card. The embedded tool must render "flat".
    // We rely on paw-ui.css rules that activate when html[data-embed="1"] is present.
    // tool-shell.js will set this when initialized, but this UI scaffold does not
    // depend on shell init yet, so we set it here as well.
    (function(){
      try{
        var params = new URLSearchParams(window.location.search);
        var isEmbedParam = params.get('embed') === '1';
        var isInIframe = (function(){ try{ return window.self !== window.top; } catch(e){ return true; } })();
        if(isEmbedParam || isInIframe){
          document.documentElement.setAttribute('data-embed','1');
        }
      }catch(e){}
    })();
  </script>

  <!--
    ProAgent Works — Connect (EMBED TOOL)
    ------------------------------------
    PURPOSE (v1 UI scaffold):
    - This file is the Circle-embedded UI for the Connect communication tool.
    - In this step we are intentionally shipping the UI skeleton first so it can be reviewed
      inside Circle before wiring to the Cloudflare Worker.

    IMPORTANT PRODUCT RULES (locked for PAW tools):
    - Circle owns the tool title. The embedded tool MUST NOT render its own title.
    - The panel top bar (.topbar-row0) contains:
        subtitle/description (left) + Reset/Tips buttons (right)
      ...and NOTHING ELSE.
    - Embed mode:
        tool-shell.js sets html[data-embed="1"] when ?embed=1 is present or when inside an iframe.
        paw-ui.css flattens the panel in embed mode so Circle provides the outer card.

    WIRING NOTE:
    - NO AI logic lives here. All model prompting + output generation will be done by the Worker.
    - This UI currently provides:
        * button-state controls (Type / Send via / Use as)
        * message/context textarea + Generate button
        * message feed area (same shell structure as other tools)
      The Generate button is stubbed for now (it adds a local placeholder message).

    FUTURE ASSISTANTS:
    - When wiring begins, reuse the proven patterns from listing.html and ask.html:
        * shell state (tool-shell.js)
        * reset contract (full reset clears UI + deletes draft)
        * resume modal + autosave (if we decide to keep it consistent with Listing)
  -->
  <style>
    /* ==========================================================
       PAW Connect — Segmented Controls (v2)
       ----------------------------------------------------------
       GOAL:
       - Make each binary choice feel like ONE connected control
         (Choose one / Send via / Use as)
       - Desktop: label inline with segmented control
       - Mobile: label stacked above full-width segmented control
       - Scoped to Connect only (no shared CSS changes yet)

       NOTE FOR FUTURE ASSISTANTS:
       - If we decide to standardize this across tools, migrate these
         styles into paw-ui.css as a reusable component (e.g. .paw-seg2).
       ========================================================== */

    body.connect-tool{
      --connect-column-inset:18px;
      --connect-response-content-inset:12px;
    }

    .connect-controls{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:12px var(--connect-column-inset) 12px;
    }

    .connect-row{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:nowrap;
    }

    .connect-block{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .connect-label{
      font-size:12px;
      font-weight:800;
      color:rgba(15,23,42,.72);
      letter-spacing:-0.01em;
      margin-right:2px;
      white-space:nowrap;
    }

    /* Segmented pill container */
    .connect-seg{
      display:flex;
      align-items:center;
      gap:0;
    }

    .connect-seg-btn{
      min-width:0;
      height:32px;
      padding:0 14px;
      white-space:nowrap;
    }

    .connect-seg-btn.is-selected,
    .connect-seg-btn[aria-pressed="true"]{
      background:rgba(5,195,249,.18);
      color:rgba(15,23,42,.92);
      box-shadow:inset 0 0 0 1px rgba(15,23,42,.08);
    }

    .connect-block--missing .connect-label{
      color:rgba(153,27,27,.84);
    }

    .connect-block--missing .connect-seg{
      box-shadow:0 0 0 1px rgba(220,38,38,.22);
      border-radius:999px;
      background:rgba(254,242,242,.85);
    }

    .connect-attached-summary{
      display:flex;
      flex-direction:column;
      gap:4px;
      margin:0 var(--connect-column-inset) 12px;
      padding:9px 11px;
      border:1px solid rgba(15,23,42,.08);
      border-radius:14px;
      background:rgba(248,250,252,.92);
    }

    .connect-attached-summary[hidden]{
      display:none !important;
    }

    .connect-attached-summary__top{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .connect-attached-summary__type{
      display:inline-flex;
      align-items:center;
      min-height:20px;
      padding:0 8px;
      border-radius:999px;
      background:rgba(5,195,249,.14);
      color:rgba(15,23,42,.84);
      font-size:11px;
      font-weight:800;
      letter-spacing:.02em;
      white-space:nowrap;
    }

    .connect-attached-summary__kicker{
      min-width:0;
      font-size:11px;
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:rgba(15,23,42,.52);
    }

    .connect-attached-summary__saved{
      font-size:12px;
      font-weight:700;
      line-height:1.25;
      color:rgba(15,23,42,.62);
    }

    .connect-attached-summary__title{
      font-size:13px;
      font-weight:800;
      line-height:1.25;
      color:rgba(15,23,42,.92);
    }

    .connect-attached-summary__facts{
      font-size:12px;
      font-weight:700;
      line-height:1.3;
      color:rgba(15,23,42,.76);
    }

    .connect-attached-summary__copy{
      font-size:12px;
      line-height:1.35;
      color:rgba(15,23,42,.66);
    }

    .connect-attached-summary__saved[hidden],
    .connect-attached-summary__title[hidden],
    .connect-attached-summary__facts[hidden],
    .connect-attached-summary__copy[hidden]{
      display:none !important;
    }

    .connect-controls .connect-block { flex: 0 0 auto; }

    @media (max-width: 1040px){
      .connect-row{
        flex-wrap:wrap;
      }
    }

    /* Mobile: stack each block, full-width segmented control */
    @media (max-width: 560px){
      body.connect-tool{
        --connect-column-inset:12px;
      }

      .connect-controls{ padding:10px var(--connect-column-inset) 12px; }
      .connect-row{
        flex-direction:column;
        align-items:stretch;
        gap:12px;
      }
      .connect-block{
        flex-direction:column;
        align-items:flex-start;
        gap:6px;
        width:100%;
      }
      .connect-seg.paw-seg.paw-seg--compact{ width:100%; display:flex; }
      .connect-seg.paw-seg.paw-seg--compact .paw-seg__btn{ flex:1 1 0; }
    }
</style>

  <script>
    const API_ENDPOINT = "https://paw-api.joe-b40.workers.dev";
    let showConnectValidation = false;

    const $resumeModal = document.getElementById("pawResumeModal");
    const $resumeClose = document.getElementById("pawResumeClose");
    const $resumeMeta = document.getElementById("pawResumeMeta");
    const $resumeFresh = document.getElementById("pawResumeFresh");
    const $resumeGo = document.getElementById("pawResumeGo");

    const DRAFT_KEY = "paw:connect:draft:v1";
    const MAX_DRAFT_HISTORY_ITEMS = 30;
    const MAX_DRAFT_SHELL_INPUT_CHARS = 8000;
    function prefsKeyForGroup(group) {
      if (group === "type") return "connect_type";
      if (group === "channel") return "connect_channel";
      return "connect_use";
    }

    function readInitialConnectValue(group) {
      try {
        const buttons = Array.from(document.querySelectorAll('.connect-seg-btn[data-group="' + String(group || "") + '"][data-value]'));
        const active = buttons.find((btn) => (
          btn.getAttribute("aria-pressed") === "true" ||
          btn.classList.contains("is-selected") ||
          btn.classList.contains("primary")
        ));
        return active ? String(active.getAttribute("data-value") || "") : "";
      } catch (_) {
        return "";
      }
    }

    function trunc(s, max) {
      s = (s == null) ? "" : String(s);
      if (!max || max <= 0) return "";
      return s.length > max ? s.slice(0, max) : s;
    }

    function storageGet(key) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (_) { return null; }
    }

    function storageSet(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); return true; } catch (_) { return false; }
    }

    function storageDel(key) {
      try { localStorage.removeItem(key); return true; } catch (_) { return false; }
    }
    const INITIAL_CONNECT_STATE = {
      connect_type: readInitialConnectValue("type"),
      connect_channel: readInitialConnectValue("channel"),
      connect_use: readInitialConnectValue("use")
    };

    const connectState = {
      connect_type: INITIAL_CONNECT_STATE.connect_type,
      connect_channel: INITIAL_CONNECT_STATE.connect_channel,
      connect_use: INITIAL_CONNECT_STATE.connect_use
    };
    let __activeListingContext = null;
    let __activeListingLoadSeq = 0;

    function getMissingConnectGroups() {
      return ["type", "channel", "use"].filter(function (group) {
        return !connectState[prefsKeyForGroup(group)];
      });
    }

    function updateConnectHelperState() {
      const missingGroups = getMissingConnectGroups();
      const helper = document.getElementById("connectHelper");

      if (helper) {
        helper.classList.toggle("is-error", showConnectValidation && missingGroups.length > 0);
      }

      document.querySelectorAll(".connect-block[data-connect-group]").forEach(function (block) {
        const group = block.getAttribute("data-connect-group") || "";
        const isMissing = showConnectValidation && missingGroups.indexOf(group) !== -1;
        block.classList.toggle("connect-block--missing", isMissing);
      });
    }

    function focusFirstMissingConnectGroup(group) {
      if (!group) return;
      const target = document.querySelector('.connect-seg-btn[data-group="' + group + '"]');
      if (target && typeof target.focus === "function") {
        target.focus();
      }
    }

    function applyConnectChoiceUI() {
      try {
        Array.from(document.querySelectorAll(".connect-seg-btn[data-group][data-value]")).forEach((btn) => {
          const group = String(btn.getAttribute("data-group") || "");
          const value = String(btn.getAttribute("data-value") || "");
          const selected =
            (group === "type" && value === connectState.connect_type) ||
            (group === "channel" && value === connectState.connect_channel) ||
            (group === "use" && value === connectState.connect_use);

          btn.classList.toggle("is-selected", selected);
          btn.setAttribute("aria-pressed", selected ? "true" : "false");
        });
      } catch (_) {}
      updateConnectHelperState();
    }

    function setConnectChoice(group, value) {
      const key = prefsKeyForGroup(group);
      const nextValue = String(value || "");
      if (!key) return;
      connectState[key] = nextValue;
      if (getMissingConnectGroups().length === 0) {
        showConnectValidation = false;
      }
      applyConnectChoiceUI();
      scheduleDraftSave();
    }

    function shouldSuppressConnectDeliverableModal(replyText) {
      const raw = String(replyText || "").replace(/\r\n?/g, "\n").trim();
      if (!raw) return false;
      if (/^subject:\s*\S+/i.test(raw)) return false;

      const normalized = raw.replace(/[’]/g, "'").replace(/\s+/g, " ").trim().toLowerCase();
      if (!normalized) return false;

      const clarificationPatterns = [
        /^what(?:'s| is) (?:the )?(?:email|text|message) about\??$/,
        /^what(?:'s| is) (?:the )?(?:email|text|message) for\??$/,
        /^what(?:'s| is) it for\??$/,
        /\bwhat kind of message (do|would) you (want|like) to send\b/,
        /^what (?:kind|type) of (?:message|email|text)\??$/,
        /^who(?:'s| is) (?:it|this) for\??$/,
        /\bwho (is|are) (this|the message|it) for\b/,
        /\bwho (do|would) you (want|like) to send (this|it|the message) to\b/,
        /\bto whom\b/,
        /\bwho is the recipient\b/,
        /\bwhat (do|would) you (want|like) (the message )?to say\b/,
        /\bwhat should (the )?message say\b/,
        /\bwhat(?:'s| is) the goal of the message\b/,
        /\bwhat details should i include\b/,
        /\bi need (just )?(one|a little|a bit|more) (detail|info|information)\b/,
        /\bneed (just )?(one|a little|a bit|more) (detail|info|information)\b/
      ];

      const isClarifying = clarificationPatterns.some(function (pattern) {
        return pattern.test(normalized);
      });

      if (!isClarifying) return false;
      return normalized.indexOf("?") !== -1 || /\bneed\b/.test(normalized);
    }

    function getConnectDeliverableMeta(reply) {
      const meta = {
        type: connectState.connect_type,
        channel: connectState.connect_channel,
        use: connectState.connect_use,
        openModal: false
      };

      return meta;
    }

    function normalizeAttachedWorkText(value) {
      return String(value == null ? "" : value).replace(/\s+/g, " ").trim();
    }

    function formatAttachedWorkAddressLine(value) {
      if (!value || typeof value !== "object") return normalizeAttachedWorkText(value);

      const direct = pickAttachedWorkText([value], [
        "full_address",
        "fullAddress",
        "formatted_address",
        "formattedAddress",
        "unparsed_address",
        "unparsedAddress",
        "one_line",
        "oneLine"
      ]);
      if (direct) return direct;

      const street = pickAttachedWorkText([value], ["street", "street1", "address1", "line1"]);
      const city = pickAttachedWorkText([value], ["city"]);
      const state = pickAttachedWorkText([value], ["state", "province", "region"]);
      const zip = pickAttachedWorkText([value], ["zip", "zip_code", "postal_code", "postalCode"]);
      const cityState = city && state ? (city + ", " + state) : (city || state);
      return [street, cityState, zip].filter(Boolean).join(" ").trim();
    }

    function clearActiveListingContext() {
      __activeListingContext = null;
      syncAttachedWorkSummary();
    }

    async function loadConnectListingContext(activeWork) {
      const seq = ++__activeListingLoadSeq;
      const aw = activeWork && typeof activeWork === "object" ? activeWork : null;
      const bucket = normalizeAttachedWorkText(aw && aw.bucket).toLowerCase();
      if (bucket !== "listings" && bucket !== "listing") {
        clearActiveListingContext();
        return;
      }

      const workId = normalizeAttachedWorkText(aw && (aw.id || aw.work_id));
      if (!workId) {
        clearActiveListingContext();
        return;
      }

      let token = "";
      try { token = (window.PAWAuth && window.PAWAuth.getToken) ? String(window.PAWAuth.getToken() || "") : ""; } catch (_) {}
      if (!token) {
        try {
          if (window.PAWAuth && window.PAWAuth.whenReady) {
            await window.PAWAuth.whenReady().catch(() => {});
            token = (window.PAWAuth && window.PAWAuth.getToken) ? String(window.PAWAuth.getToken() || "") : "";
          }
        } catch (_) {}
      }
      if (!token) {
        if (seq === __activeListingLoadSeq) clearActiveListingContext();
        return;
      }

      const url = String(API_ENDPOINT).replace(/\/+$/, "") + "/myworks/" + encodeURIComponent(workId);

      try {
        let res = await fetch(url, {
          method: "GET",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          }
        });

        let data = await res.json().catch(() => ({}));
        if (res.status === 401 || res.status === 403) {
          try {
            if (window.PAWAuth && window.PAWAuth.whenReady) {
              await window.PAWAuth.whenReady().catch(() => {});
            }
            token = (window.PAWAuth && window.PAWAuth.getToken) ? String(window.PAWAuth.getToken() || "") : "";
          } catch (_) {}

          if (token) {
            res = await fetch(url, {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
              }
            });
            data = await res.json().catch(() => ({}));
          }
        }

        if (seq !== __activeListingLoadSeq || !res.ok) {
          if (seq === __activeListingLoadSeq) clearActiveListingContext();
          return;
        }

        const work = data && data.data && data.data.work ? data.data.work : null;
        const payload = (work && work.payload && typeof work.payload === "object")
          ? work.payload
          : {};
        const pds = (payload.pds && typeof payload.pds === "object")
          ? payload.pds
          : null;

        if (!pds) {
          clearActiveListingContext();
          return;
        }

        __activeListingContext = Object.assign({}, (work && typeof work === "object") ? work : {}, {
          id: String((work && (work.id || work.work_id)) || aw.id || aw.work_id || ""),
          work_id: String((work && (work.work_id || work.id)) || aw.work_id || aw.id || ""),
          label: String((work && work.label) || aw.label || aw.name || "Untitled"),
          payload: payload,
          pds: pds
        });
        renderAttachedWorkSummary(aw);
      } catch (_) {
        if (seq === __activeListingLoadSeq) clearActiveListingContext();
      }
    }

    function humanizeAttachedWorkBucket(bucket) {
      const raw = normalizeAttachedWorkText(bucket).toLowerCase();
      if (!raw) return "";
      if (raw === "brand" || raw === "brand_assets") return "Brand";
      if (raw === "listings" || raw === "listing") return "Listing";
      if (raw === "transactions" || raw === "transaction" || raw === "deals" || raw === "deal") return "Transaction";
      return raw
        .replace(/[_-]+/g, " ")
        .replace(/\b\w/g, (m) => m.toUpperCase());
    }

    function getAttachedWorkSummaryText(activeWork) {
      const aw = activeWork && typeof activeWork === "object" ? activeWork : {};
      const ctx = getAttachedWorkListingContext(aw);
      const payload = (aw.payload && typeof aw.payload === "object") ? aw.payload : {};

      let summary = "";
      try {
        summary = normalizeAttachedWorkText((((ctx.pds || {}).narrative || {}).summary));
      } catch (_) {}
      if (summary) return trunc(summary, 160);

      try {
        const portable = (payload.portable && typeof payload.portable === "object") ? payload.portable : {};
        summary = normalizeAttachedWorkText(portable.summary || portable.intent_text);
      } catch (_) {}
      if (summary) return trunc(summary, 160);

      summary = normalizeAttachedWorkText(aw.preview);
      if (summary) return trunc(summary, 160);

      summary = normalizeAttachedWorkText(aw.subtitle);
      if (summary) return trunc(summary, 160);

      return "";
    }

    function getSavedAttachedWorkListingContext(activeWork) {
      const aw = activeWork && typeof activeWork === "object" ? activeWork : null;
      const ctx = (__activeListingContext && typeof __activeListingContext === "object") ? __activeListingContext : null;
      const awId = normalizeAttachedWorkText(aw && (aw.id || aw.work_id));
      const ctxId = normalizeAttachedWorkText(ctx && (ctx.id || ctx.work_id));
      if (!ctx || !awId || !ctxId || awId !== ctxId) return null;
      return ctx;
    }

    function parseAttachedWorkNumber(value) {
      const text = normalizeAttachedWorkText(value).replace(/,/g, "");
      if (!text) return null;
      const match = text.match(/-?\d+(?:\.\d+)?/);
      if (!match) return null;
      const num = Number(match[0]);
      return Number.isFinite(num) ? num : null;
    }

    function formatAttachedWorkNumber(value) {
      if (!Number.isFinite(value)) return "";
      const rounded = Math.round(value * 10) / 10;
      return Math.abs(rounded - Math.round(rounded)) < 0.001 ? String(Math.round(rounded)) : String(rounded);
    }

    function formatAttachedWorkNumericFact(value, suffix, extractor) {
      const text = normalizeAttachedWorkText(value);
      if (!text) return "";
      return extractor(text) || formatAttachedWorkFact(text, suffix);
    }

    function formatAttachedWorkBathFact(propertyFacts) {
      const facts = propertyFacts && typeof propertyFacts === "object" ? propertyFacts : null;
      if (!facts) return "";
      const full = parseAttachedWorkNumber(facts.bathrooms_full);
      const half = parseAttachedWorkNumber(facts.bathrooms_half);
      if (full == null && half == null) return "";
      const total = (full || 0) + ((half || 0) * 0.5);
      if (!Number.isFinite(total) || total <= 0) return "";
      return formatAttachedWorkFact(formatAttachedWorkNumber(total), "ba");
    }

    function getAttachedWorkToolState(activeWork) {
      const aw = activeWork && typeof activeWork === "object" ? activeWork : {};
      const saved = getSavedAttachedWorkListingContext(aw);
      const payloads = [
        (saved && saved.payload && typeof saved.payload === "object") ? saved.payload : null,
        (aw.payload && typeof aw.payload === "object") ? aw.payload : null
      ];
      for (const payload of payloads) {
        if (!payload || typeof payload !== "object") continue;
        if (payload.tool_state && typeof payload.tool_state === "object") return payload.tool_state;
        if (payload.form && typeof payload.form === "object") return payload;
      }
      return {};
    }

    function getAttachedWorkListingContext(activeWork) {
      const aw = activeWork && typeof activeWork === "object" ? activeWork : {};
      const saved = getSavedAttachedWorkListingContext(aw);
      const payload = (aw.payload && typeof aw.payload === "object") ? aw.payload : {};
      const savedPayload = (saved && saved.payload && typeof saved.payload === "object") ? saved.payload : {};
      const toolState = getAttachedWorkToolState(aw);
      const form = (toolState.form && typeof toolState.form === "object") ? toolState.form : {};
      const shell = (toolState.shell && typeof toolState.shell === "object") ? toolState.shell : {};
      const portable = (savedPayload.portable && typeof savedPayload.portable === "object")
        ? savedPayload.portable
        : ((payload.portable && typeof payload.portable === "object") ? payload.portable : {});
      const pds = (savedPayload.pds && typeof savedPayload.pds === "object")
        ? savedPayload.pds
        : ((payload.pds && typeof payload.pds === "object") ? payload.pds : {});
      const propertyFacts = (((pds || {}).facts || {}).property && typeof ((pds || {}).facts || {}).property === "object")
        ? ((pds || {}).facts || {}).property
        : {};
      const listing = (portable.listing && typeof portable.listing === "object")
        ? portable.listing
        : ((pds.listing && typeof pds.listing === "object")
          ? pds.listing
          : ((pds.property && typeof pds.property === "object") ? pds.property : {}));

      return { aw, saved, form, shell, portable, pds, propertyFacts, listing };
    }

    function pickAttachedWorkText(sources, keys) {
      const keyList = Array.isArray(keys) ? keys : [keys];
      for (const source of sources) {
        if (!source || typeof source !== "object") continue;
        for (const key of keyList) {
          const value = normalizeAttachedWorkText(source[key]);
          if (value) return value;
        }
      }
      return "";
    }

    function formatAttachedWorkPrice(value) {
      const text = normalizeAttachedWorkText(value);
      if (!text) return "";
      if (/^\$\s*\d/.test(text)) return text.replace(/\s+/g, " ");
      const digits = text.replace(/[^\d.]/g, "");
      if (!digits) return text;
      const num = Number(digits);
      if (!Number.isFinite(num)) return text;
      return "$" + num.toLocaleString("en-US", {
        maximumFractionDigits: digits.indexOf(".") >= 0 ? 2 : 0
      });
    }

    function formatAttachedWorkFact(value, suffix) {
      const text = normalizeAttachedWorkText(value);
      if (!text) return "";
      return new RegExp("\\b" + suffix + "\\b", "i").test(text) ? text : (text + " " + suffix);
    }

    function extractListingAddressLikeText(value) {
      const text = normalizeAttachedWorkText(value);
      if (!text) return "";
      const patterns = [
        /\b\d{1,6}\s+(?:[NSEW]\.?\s+)?(?:[A-Za-z0-9.'#/-]+\s+){0,8}(?:Street|St|Avenue|Ave|Road|Rd|Drive|Dr|Lane|Ln|Boulevard|Blvd|Court|Ct|Circle|Cir|Way|Parkway|Pkwy|Place|Pl|Terrace|Ter|Trail|Trl)\b(?:,?\s+[A-Za-z .'-]+,\s*[A-Z]{2}(?:\s+\d{5}(?:-\d{4})?)?)?/i,
        /\b\d{1,6}\s+[A-Za-z0-9.'#/-]+(?:\s+[A-Za-z0-9.'#/-]+){0,8},\s*[A-Za-z .'-]+,\s*[A-Z]{2}(?:\s+\d{5}(?:-\d{4})?)?/i
      ];
      for (const pattern of patterns) {
        const match = text.match(pattern);
        if (match) return normalizeAttachedWorkText(String(match[0] || "").replace(/[.,;:]+$/, ""));
      }
      return "";
    }

    function getAttachedWorkListingTextSources(activeWork) {
      const ctx = getAttachedWorkListingContext(activeWork);
      const history = (ctx.shell.history && Array.isArray(ctx.shell.history)) ? ctx.shell.history : [];
      const texts = [
        normalizeAttachedWorkText((((ctx.pds || {}).narrative || {}).summary)),
        normalizeAttachedWorkText(ctx.portable.summary || ctx.portable.intent_text),
        normalizeAttachedWorkText(ctx.form.input),
        normalizeAttachedWorkText(ctx.aw.preview),
        normalizeAttachedWorkText(ctx.aw.subtitle)
      ];

      for (const item of history) {
        const content = normalizeAttachedWorkText(item && item.content);
        if (content) texts.push(content);
      }

      return texts.filter(Boolean).filter(function (text, index, arr) {
        return arr.indexOf(text) === index;
      });
    }

    function findListingMatchInTexts(texts, extractor) {
      for (const text of texts) {
        const value = extractor(text);
        if (value) return value;
      }
      return "";
    }

    function extractListingPriceLikeText(value) {
      const text = normalizeAttachedWorkText(value);
      if (!text) return "";

      const dollarMatch = text.match(/\$\s?\d{1,3}(?:,\d{3})+(?:\.\d+)?|\$\s?\d{3,}(?:\.\d+)?/);
      if (dollarMatch) return formatAttachedWorkPrice(dollarMatch[0]);

      const keywordMatch = text.match(/\b(?:price|list(?:ed)? price|asking|offered at|listed at)\b\s*[:\-]?\s*\$?\s*(\d{1,3}(?:,\d{3})+|\d{6,7})(?:\.\d+)?/i);
      return keywordMatch ? formatAttachedWorkPrice(keywordMatch[1]) : "";
    }

    function extractListingBedsLikeText(value) {
      const text = normalizeAttachedWorkText(value);
      if (!text) return "";
      const match = text.match(/\b(\d+(?:\.\d+)?)\s*(?:bd|beds?|bedrooms?|br)\b/i);
      return match ? formatAttachedWorkFact(match[1], "bd") : "";
    }

    function extractListingBathsLikeText(value) {
      const text = normalizeAttachedWorkText(value);
      if (!text) return "";
      const match = text.match(/\b(\d+(?:\.\d+)?)\s*(?:ba|baths?|bathrooms?)\b/i);
      return match ? formatAttachedWorkFact(match[1], "ba") : "";
    }

    function extractListingSqftLikeText(value) {
      const text = normalizeAttachedWorkText(value);
      if (!text) return "";
      const match = text.match(/\b(\d[\d,]{2,})\s*(?:sq\.?\s*ft\.?|sqft|sf|square feet)\b/i);
      return match ? formatAttachedWorkFact(match[1], "sqft") : "";
    }

    function getAttachedWorkListingFactsFromText(value) {
      const text = normalizeAttachedWorkText(value);
      if (!text) return "";
      const price = extractListingPriceLikeText(text);
      const beds = extractListingBedsLikeText(text);
      const baths = extractListingBathsLikeText(text);
      const sqft = extractListingSqftLikeText(text);
      return [price, beds, baths, sqft].filter(Boolean).join(" · ");
    }

    function normalizeListingCompareText(value) {
      return normalizeAttachedWorkText(value)
        .toLowerCase()
        .replace(/\bbedrooms?\b/g, "bd")
        .replace(/\bbeds?\b/g, "bd")
        .replace(/\bbr\b/g, "bd")
        .replace(/\bbathrooms?\b/g, "ba")
        .replace(/\bbaths?\b/g, "ba")
        .replace(/[^\w\s$]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function stripListingFactFragments(value) {
      return normalizeAttachedWorkText(value)
        .replace(/\$\s?\d{1,3}(?:,\d{3})+(?:\.\d+)?|\$\s?\d{3,}(?:\.\d+)?/gi, " ")
        .replace(/\b(?:price|list(?:ed)? price|asking|offered at|listed at)\b\s*[:\-]?\s*\$?\s*(\d{1,3}(?:,\d{3})+|\d{6,7})(?:\.\d+)?/gi, " ")
        .replace(/\b\d+(?:\.\d+)?\s*(?:bd|beds?|bedrooms?|br)\b/gi, " ")
        .replace(/\b\d+(?:\.\d+)?\s*(?:ba|baths?|bathrooms?)\b/gi, " ")
        .replace(/\b\d[\d,]{2,}\s*(?:sq\.?\s*ft\.?|sqft|sf|square feet)\b/gi, " ")
        .replace(/[·|,;/()-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getAttachedWorkListingAddress(activeWork) {
      const ctx = getAttachedWorkListingContext(activeWork);
      const richAddress = formatAttachedWorkAddressLine(ctx.propertyFacts && ctx.propertyFacts.address);
      if (richAddress) return trunc(richAddress, 120);

      const direct = pickAttachedWorkText([ctx.listing, ctx.portable, ctx.pds, ctx.form, ctx.aw], [
        "address",
        "full_address",
        "fullAddress",
        "property_address",
        "propertyAddress",
        "street_address",
        "streetAddress",
        "listing_address",
        "listingAddress"
      ]);
      if (direct) return trunc(direct, 120);

      const street = pickAttachedWorkText(sources, ["street", "street1", "address1", "line1"]);
      const city = pickAttachedWorkText(sources, ["city", "market_city", "market"]);
      const state = pickAttachedWorkText(sources, ["state", "province", "region"]);
      const zip = pickAttachedWorkText(sources, ["zip", "zip_code", "postal_code", "postalCode"]);
      const cityState = city && state ? (city + ", " + state) : (city || state);
      const line = [street, cityState, zip].filter(Boolean).join(" ");
      if (line) return trunc(line, 120);

      const location = pickAttachedWorkText(sources, ["location"]);
      if (location) return trunc(location, 120);

      const extracted = findListingMatchInTexts(getAttachedWorkListingTextSources(activeWork), extractListingAddressLikeText);
      if (extracted) return trunc(extracted, 120);

      return "";
    }

    function getAttachedWorkListingFacts(activeWork) {
      const ctx = getAttachedWorkListingContext(activeWork);
      const sources = [ctx.listing, ctx.portable, ctx.pds, ctx.form, ctx.aw];
      const textSources = getAttachedWorkListingTextSources(activeWork);
      const price = formatAttachedWorkPrice(pickAttachedWorkText(sources, [
        "price",
        "list_price",
        "listPrice",
        "asking_price",
        "askingPrice"
      ])) || findListingMatchInTexts(textSources, extractListingPriceLikeText);
      const beds = formatAttachedWorkNumericFact(ctx.propertyFacts && ctx.propertyFacts.bedrooms, "bd", extractListingBedsLikeText)
        || formatAttachedWorkFact(pickAttachedWorkText(sources, ["beds", "bedrooms", "bed"]), "bd")
        || findListingMatchInTexts(textSources, extractListingBedsLikeText);
      const baths = formatAttachedWorkBathFact(ctx.propertyFacts)
        || formatAttachedWorkFact(pickAttachedWorkText(sources, ["baths", "bathrooms", "bath"]), "ba")
        || findListingMatchInTexts(textSources, extractListingBathsLikeText);
      const sqft = formatAttachedWorkNumericFact(ctx.propertyFacts && ctx.propertyFacts.sqft_living, "sqft", extractListingSqftLikeText)
        || formatAttachedWorkFact(pickAttachedWorkText(sources, [
        "sqft",
        "square_feet",
        "squareFeet",
        "living_area",
        "livingArea"
      ]), "sqft") || findListingMatchInTexts(textSources, extractListingSqftLikeText);

      return [price, beds, baths, sqft].filter(Boolean).join(" · ");
    }

    function getAttachedWorkListingDescriptor(activeWork, identityText, label, factsText) {
      let summary = getAttachedWorkSummaryText(activeWork);
      if (!summary) {
        const ctx = getAttachedWorkListingContext(activeWork);
        summary = normalizeAttachedWorkText(ctx.form.input);
      }
      if (!summary) return "";

      const normalizedLabel = normalizeAttachedWorkText(label).toLowerCase();
      const normalizedIdentity = normalizeAttachedWorkText(identityText).toLowerCase();
      const lowerSummary = summary.toLowerCase();

      if (normalizedLabel && lowerSummary === normalizedLabel) return "";

      if (normalizedIdentity && lowerSummary.indexOf(normalizedIdentity) === 0) {
        summary = normalizeAttachedWorkText(summary.slice(identityText.length).replace(/^[\s,.;:-]+/, ""));
      }

      if (!summary) return "";
      if (normalizedIdentity && summary.toLowerCase() === normalizedIdentity) return "";
      if (normalizedLabel && summary.toLowerCase() === normalizedLabel) return "";

      if (factsText) {
        const summaryFactsText = getAttachedWorkListingFactsFromText(summary);
        const normalizedFacts = normalizeListingCompareText(factsText);
        const normalizedSummary = normalizeListingCompareText(summary);
        const normalizedSummaryFacts = normalizeListingCompareText(summaryFactsText);
        const summaryWithoutFacts = stripListingFactFragments(summary);

        if ((normalizedSummaryFacts && normalizedSummaryFacts === normalizedFacts) ||
            (normalizedFacts && normalizedSummary === normalizedFacts) ||
            (!summaryWithoutFacts && normalizedSummaryFacts && normalizedSummaryFacts === normalizedFacts)) {
          return "";
        }
      }

      return trunc(summary, 140);
    }

    function renderAttachedWorkSummary(activeWork) {
      const root = document.getElementById("connectAttachedSummary");
      const typeEl = document.getElementById("connectAttachedType");
      const savedEl = document.getElementById("connectAttachedSaved");
      const titleEl = document.getElementById("connectAttachedTitle");
      const factsEl = document.getElementById("connectAttachedFacts");
      const copyEl = document.getElementById("connectAttachedCopy");
      if (!root || !typeEl || !savedEl || !titleEl || !factsEl || !copyEl) return;

      const aw = activeWork && typeof activeWork === "object" ? activeWork : null;
      const label = aw ? normalizeAttachedWorkText(aw.label || aw.name) : "";

      if (!aw || !label) {
        root.hidden = true;
        typeEl.hidden = true;
        typeEl.textContent = "";
        savedEl.hidden = true;
        savedEl.textContent = "";
        titleEl.hidden = false;
        titleEl.textContent = "";
        factsEl.hidden = true;
        factsEl.textContent = "";
        copyEl.hidden = true;
        copyEl.textContent = "";
        return;
      }

      const typeLabel = humanizeAttachedWorkBucket(aw.bucket);
      const bucket = normalizeAttachedWorkText(aw.bucket).toLowerCase();
      const isListing = bucket === "listing" || bucket === "listings";

      root.hidden = false;
      typeEl.hidden = !typeLabel;
      typeEl.textContent = typeLabel;

      if (isListing) {
        const identityText = getAttachedWorkListingAddress(aw);
        const factsText = getAttachedWorkListingFacts(aw);
        const primaryText = identityText || label;
        const showSavedTitle = !!label && !!identityText && label.toLowerCase() !== identityText.toLowerCase();

        savedEl.hidden = !showSavedTitle;
        savedEl.textContent = showSavedTitle ? label : "";
        titleEl.hidden = !primaryText;
        titleEl.textContent = primaryText;
        factsEl.hidden = !factsText;
        factsEl.textContent = factsText;
        copyEl.hidden = true;
        copyEl.textContent = "";
        return;
      }

      const summaryText = getAttachedWorkSummaryText(aw);
      savedEl.hidden = true;
      savedEl.textContent = "";
      titleEl.hidden = false;
      titleEl.textContent = label;
      factsEl.hidden = true;
      factsEl.textContent = "";
      copyEl.hidden = false;
      copyEl.textContent = summaryText && summaryText !== label
        ? summaryText
        : (typeLabel ? (typeLabel + " attached and ready to use.") : "Attached data ready to use.");
    }

    function syncAttachedWorkSummary() {
      try {
        const activeWork = (window.__PAWWorks && window.__PAWWorks.getActiveWork)
          ? window.__PAWWorks.getActiveWork()
          : null;
        renderAttachedWorkSummary(activeWork);
      } catch (_) {
        renderAttachedWorkSummary(null);
      }
    }
    // PAW Tool Shell init (required for consistent My Works mode across tools)
    let shell = null;
    try {
      if (window.PAWToolShell && window.PAWToolShell.init) {
        shell = window.PAWToolShell.init({
          apiEndpoint: API_ENDPOINT,
          toolId: "connect",
          beforeSend: function () {
            const missingGroups = getMissingConnectGroups();
            if (!missingGroups.length) return null;

            showConnectValidation = true;
            updateConnectHelperState();
            focusFirstMissingConnectGroup(missingGroups[0]);
            return { cancel: true };
          },
          getPrefs: function () {
            return {
              connect_type: connectState.connect_type,
              connect_channel: connectState.connect_channel,
              connect_use: connectState.connect_use
            };
          },
          getExtraPayload: function () {
            const ctx = (__activeListingContext && ((__activeListingContext.payload && __activeListingContext.payload.pds) || __activeListingContext.pds))
              ? __activeListingContext
              : null;
            return ctx ? { active_listing: ctx } : {};
          },
          getDeliverableMeta: getConnectDeliverableMeta,
          onResponse: function () {
            try { setTimeout(saveDraftNow, 0); } catch (_) {}
          }
        });
      }
    } catch (_) {}

    window.addEventListener("paw:works:active_changed", function (e) {
      const activeWork = (e && e.detail) ? e.detail.active_work : null;
      renderAttachedWorkSummary(activeWork);
      loadConnectListingContext(activeWork);
    });

    syncAttachedWorkSummary();
    try {
      const activeWork = (window.__PAWWorks && window.__PAWWorks.getActiveWork)
        ? window.__PAWWorks.getActiveWork()
        : null;
      loadConnectListingContext(activeWork);
    } catch (_) {
      clearActiveListingContext();
    }

    function buildDraft() {
      const rawShellState = (shell && shell.getState) ? shell.getState() : { history: [], input: "" };
      const shellState = {
        history: Array.isArray(rawShellState.history) ? rawShellState.history.slice(-MAX_DRAFT_HISTORY_ITEMS) : [],
        input: trunc(rawShellState.input, MAX_DRAFT_SHELL_INPUT_CHARS)
      };

      return {
        v: 1,
        updatedAt: new Date().toISOString(),
        toolId: "connect",
        connect: {
          connect_type: connectState.connect_type,
          connect_channel: connectState.connect_channel,
          connect_use: connectState.connect_use
        },
        shell: shellState
      };
    }

    function saveDraftNow() {
      try {
        const d = buildDraft();
        const hasAny =
          (d.connect && Object.values(d.connect).some((v) => String(v || "").trim())) ||
          (d.shell && Array.isArray(d.shell.history) && d.shell.history.length) ||
          (d.shell && typeof d.shell.input === "string" && d.shell.input.trim().length);

        if (!hasAny) {
          storageDel(DRAFT_KEY);
          return;
        }

        storageSet(DRAFT_KEY, d);
      } catch (_) {}
    }

    let __draftSaveT = null;

    function scheduleDraftSave() {
      try {
        if (__draftSaveT) clearTimeout(__draftSaveT);
        __draftSaveT = setTimeout(saveDraftNow, 350);
      } catch (_) {}
    }

    function openResumeModal(draft) {
      try {
        if (!$resumeModal) return;
        const d = draft || {};
        const ts = d.updatedAt ? new Date(d.updatedAt) : null;
        const when = ts && !isNaN(ts.getTime()) ? ts.toLocaleString() : "";
        $resumeMeta.textContent = `We found a saved Connect draft on this device.` + (when ? ` Last saved: ${when}.` : "");
        $resumeModal.classList.add("show");
        $resumeModal.setAttribute("aria-hidden", "false");
      } catch (_) {}
    }

    function closeResumeModal() {
      try {
        if (!$resumeModal) return;
        $resumeModal.classList.remove("show");
        $resumeModal.setAttribute("aria-hidden", "true");
      } catch (_) {}
    }

    function applyDraft(draft) {
      const d = draft && typeof draft === "object" ? draft : null;
      if (!d) return false;

      try {
        const c = d.connect || {};
        connectState.connect_type = String(c.connect_type || INITIAL_CONNECT_STATE.connect_type || "");
        connectState.connect_channel = String(c.connect_channel || INITIAL_CONNECT_STATE.connect_channel || "");
        connectState.connect_use = String(c.connect_use || INITIAL_CONNECT_STATE.connect_use || "");
        showConnectValidation = false;
        applyConnectChoiceUI();
        closeResumeModal();
        if (d.shell && shell && shell.setState) shell.setState(d.shell);
        return true;
      } catch (_) {
        return false;
      }
    }

    function fullResetConnect() {
      try { storageDel(DRAFT_KEY); } catch (_) {}
      closeResumeModal();
      try { if (shell && shell.reset) shell.reset(); } catch (_) {}
      try {
        if (window.__PAWWorks && window.__PAWWorks.detachWork) {
          window.__PAWWorks.detachWork();
        }
      } catch (_) {}
      connectState.connect_type = INITIAL_CONNECT_STATE.connect_type;
      connectState.connect_channel = INITIAL_CONNECT_STATE.connect_channel;
      connectState.connect_use = INITIAL_CONNECT_STATE.connect_use;
      showConnectValidation = false;
      applyConnectChoiceUI();
    }
    try {
      Array.from(document.querySelectorAll(".connect-seg-btn[data-group][data-value]")).forEach((btn) => {
        btn.addEventListener("click", function () {
          setConnectChoice(
            String(btn.getAttribute("data-group") || ""),
            String(btn.getAttribute("data-value") || "")
          );
        });
      });
    } catch (_) {}

    applyConnectChoiceUI();

    try {
      const $prompt = document.getElementById("prompt");
      if ($prompt) {
        $prompt.addEventListener("input", scheduleDraftSave);
        $prompt.addEventListener("change", scheduleDraftSave);
      }
    } catch (_) {}

    window.addEventListener("beforeunload", () => { try { saveDraftNow(); } catch (_) {} });

    try {
      const $reset = document.getElementById("reset");
      if ($reset) {
        $reset.addEventListener("click", function (e) {
          try { e.preventDefault(); e.stopImmediatePropagation(); } catch (_) {}
          fullResetConnect();
        }, true);
      }
    } catch (_) {}

    let __worksSaving = false;

    window.addEventListener("paw:works:save_current_output", async (e) => {
      if (__worksSaving) return;

      const detail = e && e.detail ? e.detail : {};
      const intent = String(detail.intent || "").trim();
      if (intent !== "save_updates") return;
      if (String(detail.source_action || "").trim() !== "save_existing") return;

      const aw = detail.active_work || null;
      if (!aw) return;

      const workId = String(aw.id || aw.work_id || "").trim();
      if (!workId) return;

      let token = "";
      try { token = (window.PAWAuth && window.PAWAuth.getToken) ? String(window.PAWAuth.getToken() || "") : ""; } catch (_) {}
      if (!token) {
        try {
          if (window.PAWAuth && window.PAWAuth.whenReady) {
            await window.PAWAuth.whenReady().catch(() => {});
            token = (window.PAWAuth && window.PAWAuth.getToken) ? String(window.PAWAuth.getToken() || "") : "";
          }
        } catch (_) {}
      }
      if (!token) {
        try { if (shell && shell.toast) shell.toast("Not signed in yet. Please try again."); } catch (_) {}
        return;
      }

      __worksSaving = true;
      try {
        const saveRequest =
          (window.__PAWWorks && typeof window.__PAWWorks._buildCreateMyWorkRequest === "function")
            ? window.__PAWWorks._buildCreateMyWorkRequest(String(aw.bucket || ""), String(aw.label || ""))
            : null;
        const payloadToSave = (saveRequest && saveRequest.payload && typeof saveRequest.payload === "object")
          ? saveRequest.payload
          : null;
        if (!payloadToSave) {
          try { if (shell && shell.toast) shell.toast("Couldn’t save right now."); } catch (_) {}
          return;
        }

        const url = String(API_ENDPOINT).replace(/\/+$/, "") + "/myworks/" + encodeURIComponent(workId);

        let res = await fetch(url, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({ payload: payloadToSave })
        });

        let data = await res.json().catch(() => ({}));

        if (res.status === 401 || res.status === 403) {
          try {
            if (window.PAWAuth && window.PAWAuth.whenReady) {
              await window.PAWAuth.whenReady().catch(() => {});
            }
            token = (window.PAWAuth && window.PAWAuth.getToken) ? String(window.PAWAuth.getToken() || "") : "";
          } catch (_) {}

          if (token) {
            res = await fetch(url, {
              method: "PATCH",
              headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
              },
              body: JSON.stringify({ payload: payloadToSave })
            });
            data = await res.json().catch(() => ({}));
          }
        }

        if (!res.ok) {
          try {
            const msg = (data && (data.error || data.message)) ? String(data.error || data.message) : "Couldn’t save right now.";
            if (shell && shell.toast) shell.toast(msg);
          } catch (_) {}
          return;
        }

        try { if (shell && shell.toast) shell.toast("Saved."); } catch (_) {}
      } catch (_) {
        try { if (shell && shell.toast) shell.toast("Couldn’t save right now."); } catch (_) {}
      } finally {
        __worksSaving = false;
      }
    });

    try { if ($resumeClose) $resumeClose.addEventListener("click", () => closeResumeModal()); } catch (_) {}
    try {
      if ($resumeModal) $resumeModal.addEventListener("click", (e) => { if (e.target === $resumeModal) closeResumeModal(); });
    } catch (_) {}
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeResumeModal(); } });

    try {
      if ($resumeFresh) $resumeFresh.addEventListener("click", () => {
        closeResumeModal();
        fullResetConnect();
      });
    } catch (_) {}

    try {
      if ($resumeGo) $resumeGo.addEventListener("click", () => {
        const d = storageGet(DRAFT_KEY);
        closeResumeModal();
        if (d) applyDraft(d);
      });
    } catch (_) {}

    const existingDraft = storageGet(DRAFT_KEY);
    if (existingDraft) openResumeModal(existingDraft);
  </script>

  <!-- ==========================================================
       PAW Iframe Height Reporter (v1.1 - loop-safe, STANDARD)
       ----------------------------------------------------------
       PURPOSE:
       - Reports the tool's visible panel height to the Circle parent page.
       - Enables "grow-to-fit" embeds with no internal scrollbars.
       - STANDARDIZED across all tools so Work: Ready behaves identically everywhere.
       CONTRACT:
       - Sends: { type: "paw_iframe_height_request_v1", height: <number> }
       ========================================================== -->
  <script>
    (function () {
      if (window.__PAW_HEIGHT_REPORTER_V11__) return;
      window.__PAW_HEIGHT_REPORTER_V11__ = true;

      var lastSent = 0;
      var rafPending = false;
      var IGNORE_DELTA_PX = 8;

      function px(n){ n = Number(n); return isFinite(n) ? n : 0; }

      function measureContentHeight() {
        try {
          // Prefer the visible "panel" container (consistent across PAW tools)
          var panel = document.querySelector(".panel");
          if (panel && panel.getBoundingClientRect) {
            var r = panel.getBoundingClientRect();
            return Math.ceil(px(r.height));
          }

          // Fallback: sum key areas if present
          var topbar = document.querySelector(".panel-topbar");
          var messages = document.getElementById("messages") || document.querySelector(".messages");
          var composer = document.querySelector(".composer");

          var h = 0;
          if (topbar && topbar.getBoundingClientRect) h += px(topbar.getBoundingClientRect().height);
          if (messages && messages.getBoundingClientRect) h += px(messages.getBoundingClientRect().height);
          if (composer && composer.getBoundingClientRect) h += px(composer.getBoundingClientRect().height);

          if (h > 0) return Math.ceil(h);

          // Last-resort fallback (for simpler layouts)
          var d = document.documentElement;
          return Math.ceil(Math.max(px(d.scrollHeight), px(d.offsetHeight)));
        } catch (_) {
          return 0;
        }
      }

      function postHeight(force) {
        var h = measureContentHeight();
        if (!h) return;

        if (!force && Math.abs(h - lastSent) < IGNORE_DELTA_PX) return;
        lastSent = h;

        try {
          window.parent.postMessage(
            { type: "paw_iframe_height_request_v1", height: h },
            "*"
          );
        } catch (_) {}
      }

      function schedule(force) {
        if (rafPending) return;
        rafPending = true;
        requestAnimationFrame(function () {
          rafPending = false;
          postHeight(!!force);
        });
      }

      // Initial + settle passes (fonts/images/layout settle)
      schedule(true);
      setTimeout(function(){ schedule(true); }, 120);
      setTimeout(function(){ schedule(true); }, 400);

      // DOM changes (chat streaming, Work mode swap, modal open/close, etc.)
      try {
        var mo = new MutationObserver(function(){ schedule(false); });
        mo.observe(document.body, { childList:true, subtree:true, characterData:true });
      } catch (_) {}

      // Images loading after insertion
      document.addEventListener("load", function(e){
        try { if (e.target && e.target.tagName === "IMG") schedule(false); } catch (_) {}
      }, true);

      // Resize/orientation/keyboard changes
      window.addEventListener("resize", function(){ schedule(true); });
    })();
  </script>
